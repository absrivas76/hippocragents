<template>
    <div class="card-container">
        <lightning-card>
            <!-- Custom Header -->
            <div slot="title" class="header-container">
                <lightning-icon
                    icon-name="standard:service-appointment"
                    size="small"
                    class="slds-m-right_small"
                ></lightning-icon>
                <span class="header-title">Predicted No Show Appointments</span>
                <lightning-badge
                    label={recordCount}
                    class="slds-m-left_small count-badge"
                ></lightning-badge>
            </div>

            <div class="card-body">
                <!-- Loading State -->
                <template if:true={isLoading}>
                    <div class="loading-container">
                        <lightning-spinner
                            alternative-text="Loading"
                            size="small"
                        ></lightning-spinner>
                    </div>
                </template>

                <template if:false={isLoading}>
                    <!-- Error State -->
                    <template if:true={error}>
                        <div class="error-container">
                            <lightning-icon
                                icon-name="utility:error"
                                variant="error"
                                size="small"
                                class="slds-m-right_x-small"
                            ></lightning-icon>
                            <span>{error}</span>
                        </div>
                    </template>

                    <template if:true={hasRecords}>

                        <!-- ─── Chart Section ─── -->
                        <template if:true={hasChartData}>
                            <div class="chart-section">
                                <div class="chart-card">
                                    <div class="chart-layout">

                                        <!-- SVG Doughnut -->
                                        <div class="chart-canvas-container">
                                            <svg viewBox="0 0 180 180" class="doughnut-svg">
                                                <!-- Background circle -->
                                                <circle
                                                    cx="90" cy="90" r="70"
                                                    fill="none"
                                                    stroke="#e2e8f0"
                                                    stroke-width="24"
                                                ></circle>

                                                <!-- Completed arc (green) - drawn first (behind) -->
                                                <circle
                                                    cx="90" cy="90" r="70"
                                                    fill="none"
                                                    stroke="#10b981"
                                                    stroke-width="24"
                                                    stroke-dasharray={completedDash}
                                                    stroke-dashoffset={completedOffset}
                                                    stroke-linecap="round"
                                                    class="arc-segment arc-completed"
                                                    transform="rotate(-90 90 90)"
                                                ></circle>

                                                <!-- No Show arc (red) - drawn on top -->
                                                <circle
                                                    cx="90" cy="90" r="70"
                                                    fill="none"
                                                    stroke="#ef4444"
                                                    stroke-width="24"
                                                    stroke-dasharray={noShowDash}
                                                    stroke-linecap="round"
                                                    class="arc-segment arc-noshow"
                                                    transform="rotate(-90 90 90)"
                                                ></circle>

                                                <!-- Center text -->
                                                <text x="90" y="82" text-anchor="middle" class="center-count">{totalCount}</text>
                                                <text x="90" y="102" text-anchor="middle" class="center-label">Total</text>
                                            </svg>
                                        </div>

                                        <!-- Stats Panel -->
                                        <div class="chart-stats-panel">
                                            <div class="chart-stats-title">Appointment Predictions</div>

                                            <!-- No Show -->
                                            <div class="stat-row">
                                                <div class="stat-row-left">
                                                    <span class="stat-dot stat-dot-noshow"></span>
                                                    <span class="stat-row-label">Predicted No Show</span>
                                                </div>
                                                <div class="stat-row-right">
                                                    <span class="stat-row-count stat-count-noshow">{noShowCount}</span>
                                                    <span class="stat-row-pct">({noShowPercentage}%)</span>
                                                </div>
                                            </div>
                                            <div class="progress-bar-bg">
                                                <div class="progress-bar-fill progress-noshow" style={noShowBarStyle}></div>
                                            </div>

                                            <!-- Completed -->
                                            <div class="stat-row slds-m-top_small">
                                                <div class="stat-row-left">
                                                    <span class="stat-dot stat-dot-completed"></span>
                                                    <span class="stat-row-label">Predicted Completed</span>
                                                </div>
                                                <div class="stat-row-right">
                                                    <span class="stat-row-count stat-count-completed">{completedCount}</span>
                                                    <span class="stat-row-pct">({completedPercentage}%)</span>
                                                </div>
                                            </div>
                                            <div class="progress-bar-bg">
                                                <div class="progress-bar-fill progress-completed" style={completedBarStyle}></div>
                                            </div>

                                            <!-- Total -->
                                            <div class="stat-total-row">
                                                <span class="stat-total-label">Total Scheduled</span>
                                                <span class="stat-total-count">{totalCount}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <!-- ─── Table ─── -->
                        <div class="table-container">
                            <lightning-datatable
                                key-field="Id"
                                data={serviceAppointments}
                                columns={columns}
                                hide-checkbox-column
                                show-row-number-column
                            ></lightning-datatable>
                        </div>

                        <!-- ─── Advisory Message ─── -->
                        <div class="advisory-container">
                            <div class="advisory-box">
                                <div class="advisory-header">
                                    <lightning-icon
                                        icon-name="utility:warning"
                                        variant="warning"
                                        size="small"
                                        class="slds-m-right_x-small"
                                    ></lightning-icon>
                                    <strong>These patients have a higher risk of not attending.</strong>
                                </div>
                                <div class="advisory-body">
                                    <p class="advisory-subtitle">Please review and consider:</p>
                                    <ul class="advisory-list">
                                        <li>
                                            <lightning-icon
                                                icon-name="utility:outbound_call"
                                                size="xx-small"
                                                class="list-icon"
                                            ></lightning-icon>
                                            Proactive outreach
                                        </li>
                                        <li>
                                            <lightning-icon
                                                icon-name="utility:check"
                                                size="xx-small"
                                                class="list-icon"
                                            ></lightning-icon>
                                            Confirming the appointment
                                        </li>
                                        <li>
                                            <lightning-icon
                                                icon-name="utility:sms"
                                                size="xx-small"
                                                class="list-icon"
                                            ></lightning-icon>
                                            Sending reminder calls or SMS
                                        </li>
                                        <li>
                                            <lightning-icon
                                                icon-name="utility:event"
                                                size="xx-small"
                                                class="list-icon"
                                            ></lightning-icon>
                                            Overbooking, if appropriate
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- Empty State -->
                    <template if:false={hasRecords}>
                        <template if:false={error}>
                            <div class="empty-container">
                                <lightning-icon
                                    icon-name="utility:like"
                                    size="large"
                                    class="empty-icon"
                                ></lightning-icon>
                                <p class="empty-title">All Clear!</p>
                                <p class="empty-subtitle">
                                    No predicted no-show appointments found for this resource.
                                </p>
                            </div>
                        </template>
                    </template>
                </template>
            </div>
        </lightning-card>
    </div>
</template>
